<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Услуги</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
  <div id="menu-placeholder"></div>

  <main class="container my-5 flex-grow-1">
    <h1 class="mb-4 text-center">Наши услуги</h1>
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">Веб-разработка</h5>
            <p class="card-text">Создание сайтов любой сложности, интернет-магазинов, корпоративных порталов.</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">SEO-оптимизация</h5>
            <p class="card-text">Продвижение сайтов в поисковых системах, увеличение видимости и трафика.</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">Дизайн</h5>
            <p class="card-text">Разработка уникального дизайна, адаптивная вёрстка, UI/UX-аудит.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="load-components.js"></script>
</body>
</html>
